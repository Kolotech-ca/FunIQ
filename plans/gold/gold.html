<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunIQ Gold Page</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { margin: 0; font-family: 'Nunito', sans-serif; background: #eaf6ff; }
html { scroll-padding-top: 80px;}
:root { --navbar-height: 70px;}

.navbar { position: fixed; top: 0; left: 0; width: 100%; background: linear-gradient(90deg, #ff4fa3, #2da9ff); display: flex; align-items: center; padding: 10px 20px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.logo img { height:50px; }

.menu-container { display: flex; align-items: center; width: 100%; justify-content: center; }
.menu { display: flex; align-items: center; gap: 15px; }

.dropdown { position: relative; }
.dropbtn { background: none; border: none; color: white; font-size: 16px; cursor: pointer; padding: 8px 12px; font-weight: 600; }

.dropdown-content {
  max-height: 0;
  overflow: hidden;
  position: absolute;
  top: 100%;
  left: 0;
  background: #ffe6f3;
  min-width: 150px;
  border-radius: 6px;
  transition: max-height 0.3s ease;
}
.dropdown-content a {
  color: #2da9ff;
  padding: 10px;
  display: block;
  text-decoration: none;
  font-weight: 600;
}
.dropdown-content a:hover { background:#ff4fa3; color:#fff; }
.dropdown:hover .dropdown-content { max-height:500px; }

.buy-link { color:white; text-decoration:none; font-weight:700; padding:8px 12px; }
.buy-link:hover { background:#ffe6f3; color:#ff4fa3; }

#quiz-section {
  margin-top: var(--navbar-height);
  padding: 20px;
  min-height: 400px;
  background: #fff;
  border: 5px solid #FFD700;
  border-radius: 10px;
  text-align: center;
}

.answer-btn {
  display:block;
  margin:10px auto;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#2da9ff;
  color:white;
  cursor:pointer;
}
.answer-btn:hover { background:#ff4fa3; }

.worksheets-section {
  margin:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  border:5px solid #FFD700;
  border-radius:10px;
  padding:20px;
  background:#f2f2f2;
}
.worksheets-section h2 {
  grid-column:1/-1;
  text-align:center;
  color:#FFD700;
}

.card {
  border:2px solid #FFD700;
  padding:20px;
  text-align:center;
  background:#ffe6f3;
  cursor:pointer;
  border-radius:10px;
}
.card:hover { background:#FFD700; color:white; transform:scale(1.05); }

footer {
  background: linear-gradient(90deg, #ff4fa3, #2da9ff);
  color:white;
  text-align:center;
  padding:20px;
}

/* MODAL */
#worksheetModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  z-index:2000;
}
.modal-content {
  position:relative;
  width:90%;
  height:90%;
  margin:3% auto;
  background:white;
  border-radius:10px;
  overflow:hidden;
}
.close-btn {
  position:absolute;
  top:10px;
  right:20px;
  font-size:30px;
  cursor:pointer;
  color:#ff4fa3;
}
</style>
</head>

<body>

<!-- NAVBAR (UNCHANGED) -->
<nav class="navbar">
<a href="../../index.html" class="logo"><img src="../../logo.png"></a>

<div class="menu-container">
<div class="menu">

<!-- ALL GRADES -->
<script>
function gradeMenu(g){
  return `
  <div class="dropdown">
    <button class="dropbtn">Grade ${g}</button>
    <div class="dropdown-content">
      <a href="#" onclick="startQuiz(${g}, 'Math')">Math</a>
      <a href="#" onclick="startQuiz(${g}, 'Science')">Science</a>
      <a href="#" onclick="startQuiz(${g}, 'English')">English</a>
      <a href="#" onclick="startQuiz(${g}, 'Social')">Social</a>
    </div>
  </div>`;
}
</script>

<script>
document.write(
  gradeMenu(1)+gradeMenu(2)+gradeMenu(3)+
  gradeMenu(4)+gradeMenu(5)+gradeMenu(6)
);
</script>

<a href="#worksheets" class="buy-link">Buy Worksheets</a>

<span class="buy-link" style="background:#FFD700;">
<a href="#" onclick="location.reload()">Gold</a>
</span>

</div>
</div>
</nav>

<!-- QUIZ -->
<section id="quiz-section">
<p style="color:#aaa;">Select a grade and subject to start the quiz.</p>
</section>

<!-- WORKSHEETS -->
<section class="worksheets-section" id="worksheets">
<h2>Buy Printable Worksheets</h2>

<div class="card" onclick="openModal('../../worksheets/grade1.html')">Grade 1</div>
<div class="card" onclick="openModal('../../worksheets/grade2.html')">Grade 2</div>
<div class="card" onclick="openModal('../../worksheets/grade3.html')">Grade 3</div>
<div class="card" onclick="openModal('../../worksheets/grade4.html')">Grade 4</div>
<div class="card" onclick="openModal('../../worksheets/grade5.html')">Grade 5</div>
<div class="card" onclick="openModal('../../worksheets/grade6.html')">Grade 6</div>

</section>

<!-- FOOTER -->
<footer>
<p>&copy; 2026 <a href="../../index.html">FunIQ.ca</a> | Contact: <a href="mailto:info@funiq.ca">info@FunIQ.ca</a></p>
<p>Follow us: 
  <a href="#">Facebook</a> | 
  <a href="https://www.instagram.com/funiq.ca" target="_blank">Instagram</a> | 
  <a href="https://www.youtube.com/@funiqca" target="_blank">YouTube</a></p>
</footer>

<!-- MODAL -->
<div id="worksheetModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">✖</span>
    <iframe id="modalFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script>
let questionsData = [], currentList=[], index=0, score=0;

fetch('questions.xlsx')
.then(r=>r.arrayBuffer())
.then(data=>{
  const wb = XLSX.read(data,{type:'array'});
  wb.SheetNames.forEach(name=>{
    const sheet = XLSX.utils.sheet_to_json(wb.Sheets[name]);
    sheet.forEach(r=>r.Grade=parseInt(name.replace(/[^0-9]/g,'')));
    questionsData = questionsData.concat(sheet);
  });
});

function startQuiz(g,s){
  currentList = questionsData.filter(q=>q.Grade===g && q.Subject===s);
  index=0; score=0;
  showQuestion();
}

function showQuestion(){
  if(index>=currentList.length){
    document.getElementById("quiz-section").innerHTML =
    `<h3>Finished</h3><p>${score}/${currentList.length}</p>`;
    return;
  }
  const q=currentList[index];
  document.getElementById("quiz-section").innerHTML = `
  <h3>Grade ${q.Grade} - ${q.Subject}</h3>
  <p>${q.Question}</p>
  <button class="answer-btn" onclick="checkAnswer('A')">A: ${q.OptionA}</button>
  <button class="answer-btn" onclick="checkAnswer('B')">B: ${q.OptionB}</button>
  <button class="answer-btn" onclick="checkAnswer('C')">C: ${q.OptionC}</button>
  <button class="answer-btn" onclick="checkAnswer('D')">D: ${q.OptionD}</button>`;
}

function checkAnswer(c){
  if(c===currentList[index].Answer) score++;
  index++;
  showQuestion();
}

/* MODAL */
function openModal(file){
  document.getElementById("worksheetModal").style.display="block";
  document.getElementById("modalFrame").src=file;
}
function closeModal(){
  document.getElementById("worksheetModal").style.display="none";
  document.getElementById("modalFrame").src="";
}
window.onclick=function(e){
  if(e.target.id==="worksheetModal") closeModal();
}
</script>

</body>
</html>
