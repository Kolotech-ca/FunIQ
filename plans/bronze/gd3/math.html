<!DOCTYPE html>
<html>
<head>
<title>Grade 3 Math Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>📘 Grade 3 Math Game</h2>

<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
  { "q": "23 + 15 = ?", "o": ["36", "38", "39", "37"], "a": "38" },
  { "q": "45 - 19 = ?", "o": ["25", "27", "26", "24"], "a": "26" },
  { "q": "6 × 4 = ?", "o": ["26", "24", "22", "20"], "a": "24" },
  { "q": "36 ÷ 6 = ?", "o": ["7", "6", "4", "5"], "a": "6" },
  { "q": "Which number is even?", "o": ["18", "19", "21", "17"], "a": "18" },
  { "q": "10 + 30 + 5 = ?", "o": ["50", "40", "45", "35"], "a": "45" },
  { "q": "50 - 25 = ?", "o": ["25", "35", "20", "30"], "a": "25" }
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

let data=quiz[current];
q.innerText=data.q;
opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;
div.onclick=()=>check(option);
opt.appendChild(div);
});

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="Correct!";
}
else{
feedback.innerHTML="Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}
else{
finish();
}

}

function finish(){
q.innerHTML="Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
