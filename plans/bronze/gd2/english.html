<!DOCTYPE html>
<html>
<head>
<title>Grade 2 English Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>📘 Grade 2 English Game</h2>

<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
  { "q": "Plural of 'Cat'?", "o": ["Cat", "Cats", "Caty", "Cates"], "a": "Cats" },
  { "q": "Opposite of Hot?", "o": ["Warm", "Cold", "Cool", "Heat"], "a": "Cold" },
  { "q": "Which is a verb?", "o": ["Book", "Run", "Dog", "Table"], "a": "Run" },
  { "q": "Which is a color?", "o": ["Eat", "Run", "Blue", "Jump"], "a": "Blue" },
  { "q": "Opposite of Big?", "o": ["Large", "Small", "Tall", "Huge"], "a": "Small" },
  { "q": "Which word is an animal?", "o": ["Lamp", "Book", "Tiger", "Chair"], "a": "Tiger" },
  { "q": "Which letter is vowel?", "o": ["S", "E", "T", "R"], "a": "E" }
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

let data=quiz[current];
q.innerText=data.q;
opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;
div.onclick=()=>check(option);
opt.appendChild(div);
});

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="Correct!";
}
else{
feedback.innerHTML="Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}
else{
finish();
}

}

function finish(){
q.innerHTML="Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
