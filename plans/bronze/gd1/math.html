<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 1 Maths Game 🎮</title>
<style>
body {
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(to right,#bde0fe,#ffc8dd);
  text-align: center;
  padding: 20px;
  overflow-x: hidden;
}
h1 {
  color:#ff4da6;
}
.quiz-box {
  background:white;
  max-width:600px;
  margin:auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  position: relative;
}
.progress {
  width:100%;
  height:18px;
  background:#eee;
  border-radius:20px;
  margin-bottom:20px;
  overflow:hidden;
}
.progress-bar {
  height:100%;
  width:0%;
  background:#ff66b3;
  transition:0.4s;
}
.question {
  font-size:22px;
  margin-bottom:15px;
}
.option {
  background:#d0f0ff;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
.option:hover { background:#ffd6eb; }
.option.wrong { animation: shake 0.3s; background:#ffcccb; }
@keyframes shake {
  0% {transform:translateX(0);}
  25% {transform:translateX(-5px);}
  50% {transform:translateX(5px);}
  75% {transform:translateX(-5px);}
  100% {transform:translateX(0);}
}
.feedback { font-size:20px; margin-top:10px; }
.score { font-size:28px; color:#ff4da6; margin-top:20px; }
.stars { font-size:24px; margin:10px; color:#FFD700; }
img.answer-img { width: 50px; height: 50px; margin: 2px; }
button.restart {
  padding:10px 20px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#1e90ff;
  color:white;
  cursor:pointer;
  margin-top:20px;
}
button.restart:hover { background:#ff69b4; }
/* Confetti styles */
.confetti {
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(0);}
  100%{transform:translateY(100vh);}
}
</style>
</head>
<body>


<div class="quiz-box">

<h4>🎉 Grade 1 Maths Game 🎮</h4>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div class="question" id="question"></div>
<div id="options"></div>
<div id="images"></div>
<div class="feedback" id="feedback"></div>
<div class="stars" id="stars"></div>
<div class="score" id="score"></div>
<button class="restart" id="restart" style="display:none;">🔄 Restart Quiz</button>

</div>

<!-- Sounds -->
<audio id="correct-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong-sound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="win-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
// Quiz data
const quiz = [
  {q:"How many apples?", o:["3","4","5","2"], a:"4", img:"🍎🍎🍎🍎"},
  {q:"How many stars?", o:["5","6","7","4"], a:"5", img:"⭐⭐⭐⭐⭐"},
  {q:"How many dogs?", o:["2","3","1","4"], a:"3", img:"🐶🐶🐶"},
  {q:"How many bananas?", o:["3","2","4","5"], a:"2", img:"🍌🍌"},
  {q:"How many cats?", o:["4","3","2","5"], a:"4", img:"🐱🐱🐱🐱"},
  {q:"How many oranges?", o:["5","3","4","6"], a:"4", img:"🍊🍊🍊🍊"},
  {q:"How many hearts?", o:["2","3","1","4"], a:"3", img:"❤️❤️❤️"}
];

let current=0;
let score=0;
let starsEarned=0;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const imagesEl = document.getElementById("images");
const feedbackEl = document.getElementById("feedback");
const progressEl = document.getElementById("progress");
const scoreEl = document.getElementById("score");
const starsEl = document.getElementById("stars");
const restartBtn = document.getElementById("restart");

const correctSound = document.getElementById("correct-sound");
const wrongSound = document.getElementById("wrong-sound");
const winSound = document.getElementById("win-sound");

// Load question
function loadQuestion(){
  feedbackEl.innerHTML="";
  imagesEl.innerHTML="";
  let q = quiz[current];
  questionEl.innerText = q.q;
  // Show images
  for(let ch of q.img){
    const span = document.createElement("span");
    span.className = "answer-img";
    span.innerText = ch;
    imagesEl.appendChild(span);
  }
  optionsEl.innerHTML="";
  q.o.forEach(opt=>{
    let div = document.createElement("div");
    div.className="option";
    div.innerText=opt;
    div.onclick=()=>checkAnswer(div,opt);
    optionsEl.appendChild(div);
  });
  updateProgress();
  starsEl.innerHTML = "⭐".repeat(starsEarned);
}

// Check answer
function checkAnswer(div,selected){
  let correct=quiz[current].a;
  if(selected===correct){
    score++;
    starsEarned++;
    feedbackEl.innerHTML="✅ Correct!";
    div.style.background="#98fb98"; // green
    correctSound.play();
    popStar(div);
  }else{
    feedbackEl.innerHTML="❌ Correct answer: "+correct;
    div.classList.add("wrong");
    wrongSound.play();
  }
  starsEl.innerHTML = "⭐".repeat(starsEarned);
  setTimeout(()=>{
    current++;
    if(current<quiz.length){
      loadQuestion();
    }else{
      finishQuiz();
    }
  },1000);
}

// Star pop animation
function popStar(div){
  const star = document.createElement("span");
  star.className="stars";
  star.innerText="⭐";
  star.style.position="absolute";
  star.style.left=div.offsetLeft+"px";
  star.style.top=div.offsetTop+"px";
  div.parentElement.appendChild(star);
  setTimeout(()=>star.remove(),800);
}

// Update progress
function updateProgress(){
  let percent=(current/quiz.length)*100;
  progressEl.style.width=percent+"%";
}

// Finish quiz
function finishQuiz(){
  questionEl.innerHTML="🏆 Quiz Completed!";
  optionsEl.innerHTML="";
  imagesEl.innerHTML="";
  feedbackEl.innerHTML="";
  scoreEl.innerHTML="Your Score: "+score+" / "+quiz.length;
  restartBtn.style.display="inline-block";
  progressEl.style.width="100%";
  launchConfetti();
  winSound.play();
}

// Restart quiz
restartBtn.onclick = ()=>{
  current=0; score=0; starsEarned=0;
  scoreEl.innerHTML="";
  restartBtn.style.display="none";
  loadQuestion();
}

// Confetti effect
function launchConfetti(){
  for(let i=0;i<50;i++){
    let conf=document.createElement("div");
    conf.className="confetti";
    conf.innerText="🎉";
    conf.style.left=Math.random()*100+"vw";
    conf.style.fontSize=(Math.random()*24+12)+"px";
    conf.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),4000);
  }
}

// Initialize
loadQuestion();
</script>

</body>
</html>
