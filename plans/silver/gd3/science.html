<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 3 Science Game</title>

<style>
body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.progress{
width:100%;
height:18px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:#ff66b3;
transition:0.4s;
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.option.wrong{
animation:shake 0.3s;
background:#ffcccb;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

button.restart{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#1e90ff;
color:white;
cursor:pointer;
margin-top:20px;
}

.confetti{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="quiz-box">

<h2>🔬 Grade 3 Science Game</h2>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<h3 id="question"></h3>
<div id="options"></div>
<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>
<button id="restart" class="restart" style="display:none;">Restart</button>

</div>

<audio id="correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>

const quiz=[
{q:"Plants make food in their?", o:["Leaves","Roots","Stem","Flower"], a:"Leaves"},
{q:"Which animal lives in water?", o:["Fish","Dog","Cat","Cow"], a:"Fish"},
{q:"Which gas do plants need?", o:["Carbon dioxide","Oxygen","Nitrogen","Helium"], a:"Carbon dioxide"},
{q:"Which sense organ helps us hear?", o:["Ear","Eye","Nose","Hand"], a:"Ear"},
{q:"The sun gives us?", o:["Heat and light","Rain","Wind","Snow"], a:"Heat and light"},
{q:"Which is a solid?", o:["Ice","Air","Steam","Smoke"], a:"Ice"},
{q:"Which animal lays eggs?", o:["Hen","Cow","Dog","Goat"], a:"Hen"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const progress=document.getElementById("progress");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");
const restart=document.getElementById("restart");

const correctSound=document.getElementById("correct");
const wrongSound=document.getElementById("wrong");
const winSound=document.getElementById("win");

function loadQuestion(){

feedback.innerHTML="";

let data=quiz[current];

q.innerText=data.q;

opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;
div.onclick=()=>checkAnswer(div,option);
opt.appendChild(div);
});

progress.style.width=(current/quiz.length*100)+"%";

starsEl.innerHTML="⭐".repeat(stars);

}

function checkAnswer(div,answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="✅ Correct!";
div.style.background="#98fb98";
correctSound.play();
}
else{
feedback.innerHTML="❌ Correct: "+quiz[current].a;
div.classList.add("wrong");
wrongSound.play();
}

setTimeout(()=>{

current++;

if(current<quiz.length){
loadQuestion();
}
else{
finishQuiz();
}

},1000);

}

function finishQuiz(){

q.innerHTML="🏆 Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
restart.style.display="inline-block";
progress.style.width="100%";
winSound.play();
launchConfetti();

}

restart.onclick=()=>{
current=0;
score=0;
stars=0;
scoreEl.innerHTML="";
restart.style.display="none";
loadQuestion();
};

function launchConfetti(){

for(let i=0;i<50;i++){
let conf=document.createElement("div");
conf.className="confetti";
conf.innerText="🎉";
conf.style.left=Math.random()*100+"vw";
conf.style.fontSize=(Math.random()*24+12)+"px";
conf.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),4000);
}

}

loadQuestion();

</script>

</body>
</html>
