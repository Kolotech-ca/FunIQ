<!DOCTYPE html>
<html>
<head>
<title>Grade 3 Math Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>📘 Grade 3 Math Game</h2>

<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
  {"question":"What is 12 + 8?","o":["20","19","21","18"],"a":"20"},
  {"question":"What is 15 - 7?","o":["8","7","9","6"],"a":"8"},
  {"question":"What is 6 × 4?","o":["24","22","20","26"],"a":"24"},
  {"question":"What is 36 ÷ 6?","o":["6","5","7","8"],"a":"6"},
  {"question":"Which number comes after 49?","o":["50","48","51","49"],"a":"50"},
  {"question":"Which number comes before 73?","o":["72","71","74","73"],"a":"72"},
  {"question":"What is 9 + 5?","o":["14","15","13","12"],"a":"14"},
  {"question":"What is 18 - 9?","o":["9","8","10","7"],"a":"9"},
  {"question":"Which is an even number?","o":["12","11","9","7"],"a":"12"},
  {"question":"Which is an odd number?","o":["17","16","18","14"],"a":"17"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

feedback.innerHTML="";

let data=quiz[current];

q.innerText=data.question;

opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;

div.onclick=function(){
check(option);
};

opt.appendChild(div);
});

starsEl.innerHTML="⭐".repeat(stars);

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="✅ Correct!";
}else{
feedback.innerHTML="❌ Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}else{
finish();
}

}

function finish(){
q.innerHTML="🏆 Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
