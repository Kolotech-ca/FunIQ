<!DOCTYPE html>
<html>
<head>
<title>Grade 2 English Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>📘 Grade 2 English Game</h2>

<h3 id="question"></h3>
<div id="o" ></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
{"question":"Which word is a noun?","o":["Run","Apple","Jump","Quickly"],"a":"Apple"},
{"question":"Which word is a verb?","o":["Sing","Table","Cat","Blue"],"a":"Sing"},
{"question":"Which word is an adjective?","o":["Happy","Dog","Eat","Chair"],"a":"Happy"},
{"question":"Which word is a pronoun?","o":["He","Book","Car","Tree"],"a":"He"},
{"question":"Which word is an opposite of 'hot'?","o":["Cold","Warm","Sun","Fire"],"a":"Cold"},
{"question":"Which word is a color?","o":["Red","Run","Dog","Eat"],"a":"Red"},
{"question":"Which word is a preposition?","o":["Under","Chair","Jump","Apple"],"a":"Under"},
{"question":"Which word is a question word?","o":["Why","Table","Run","Sun"],"a":"Why"},
{"question":"Which word is plural?","o":["Cats","Cat","Dog","Book"],"a":"Cats"},
{"question":"Which word is a conjunction?","o":["And","Blue","Sing","Tree"],"a":"And"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("o");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

feedback.innerHTML="";

let data=quiz[current];

q.innerText=data.question;

opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;

div.onclick=function(){
check(option);
};

opt.appendChild(div);
});

starsEl.innerHTML="⭐".repeat(stars);

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="✅ Correct!";
}else{
feedback.innerHTML="❌ Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}else{
finish();
}

}

function finish(){
q.innerHTML="🏆 Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
