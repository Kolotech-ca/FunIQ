<!DOCTYPE html>
<html>
<head>
<title>Grade 6 Math Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>📘 Grade 6 Math Game</h2>

<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
{q:"15 × 12 = ?", o:["180","170","160","175"], a:"180"},
{q:"250 ÷ 5 = ?", o:["50","40","45","55"], a:"50"},
{q:"What is 20% of 200?", o:["40","20","30","50"], a:"40"},
{q:"36 × 4 = ?", o:["144","140","132","136"], a:"144"},
{q:"Which is a prime number?", o:["17","21","27","33"], a:"17"},
{q:"1000 - 475 = ?", o:["525","515","535","505"], a:"525"},
{q:"9² = ?", o:["81","72","90","99"], a:"81"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

let data=quiz[current];
q.innerText=data.q;
opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;
div.onclick=()=>check(option);
opt.appendChild(div);
});

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="Correct!";
}
else{
feedback.innerHTML="Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}
else{
finish();
}

}

function finish(){
q.innerHTML="Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
