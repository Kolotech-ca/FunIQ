<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 1 Science Game</title>

<style>
body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.progress{
width:100%;
height:18px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:#ff66b3;
transition:0.4s;
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.option.wrong{
animation:shake 0.3s;
background:#ffcccb;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

button.restart{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#1e90ff;
color:white;
cursor:pointer;
margin-top:20px;
}

.confetti{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="quiz-box">

<h2>🔬 Grade 5 Science Game</h2>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<h3 id="question"></h3>
<div id="options"></div>
<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>
<button id="restart" class="restart" style="display:none;">Restart</button>

</div>

<audio id="correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>

const quiz=[
  {"question":"Which organ pumps blood in the body?","o":["Heart","Lungs","Brain","Stomach"],"a":"Heart"},
  {"question":"Which planet is known as the Blue Planet?","o":["Earth","Mars","Jupiter","Venus"],"a":"Earth"},
  {"question":"Which gas is essential for breathing?","o":["Oxygen","Carbon Dioxide","Nitrogen","Hydrogen"],"a":"Oxygen"},
  {"question":"Which animal can live both on land and water?","o":["Frog","Dog","Cat","Elephant"],"a":"Frog"},
  {"question":"Which is a solid?","o":["Rock","Water","Air","Juice"],"a":"Rock"},
  {"question":"Which is a liquid?","o":["Water","Ice","Sand","Rock"],"a":"Water"},
  {"question":"Which part helps us smell?","o":["Nose","Eyes","Hands","Ears"],"a":"Nose"},
  {"question":"Which planet has rings?","o":["Saturn","Mars","Earth","Venus"],"a":"Saturn"},
  {"question":"Which sense helps us taste?","o":["Tongue","Eyes","Hands","Nose"],"a":"Tongue"},
  {"question":"Which is a renewable energy source?","o":["Solar","Coal","Oil","Gas"],"a":"Solar"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

feedback.innerHTML="";

let data=quiz[current];

q.innerText=data.question;

opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;

div.onclick=function(){
check(option);
};

opt.appendChild(div);
});

starsEl.innerHTML="⭐".repeat(stars);

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="✅ Correct!";
}else{
feedback.innerHTML="❌ Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}else{
finish();
}

}

function finish(){
q.innerHTML="🏆 Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
