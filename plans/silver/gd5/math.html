<!DOCTYPE html>
<html>
<head>
<title>Grade 5 Math Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>📘 Grade 5 Math Game</h2>

<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
  {"question":"What is 125 + 376?","o":["501","502","500","503"],"a":"501"},
  {"question":"What is 640 - 285?","o":["355","356","354","357"],"a":"355"},
  {"question":"What is 12 × 8?","o":["96","95","97","94"],"a":"96"},
  {"question":"What is 144 ÷ 12?","o":["12","11","13","10"],"a":"12"},
  {"question":"Which number comes after 999?","o":["1000","1001","998","999"],"a":"1000"},
  {"question":"Which number comes before 2021?","o":["2020","2019","2022","2021"],"a":"2020"},
  {"question":"What is 45 + 38?","o":["83","82","84","81"],"a":"83"},
  {"question":"What is 72 - 19?","o":["53","52","54","51"],"a":"53"},
  {"question":"Which is an even number?","o":["68","67","69","71"],"a":"68"},
  {"question":"Which is an odd number?","o":["75","74","76","78"],"a":"75"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

feedback.innerHTML="";

let data=quiz[current];

q.innerText=data.question;

opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;

div.onclick=function(){
check(option);
};

opt.appendChild(div);
});

starsEl.innerHTML="⭐".repeat(stars);

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="✅ Correct!";
}else{
feedback.innerHTML="❌ Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}else{
finish();
}

}

function finish(){
q.innerHTML="🏆 Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
