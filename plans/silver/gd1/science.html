<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grade 1 Science Quiz</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#c3ffd8,#fff0c3);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

button{
display:block;
width:80%;
margin:10px auto;
padding:14px;
font-size:18px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
cursor:pointer;
}

#nextBtn{
background:#ff9800;
}

</style>
</head>

<body>


<div class="quiz-box">
<h3>🔬 Grade 1 Science Quiz</h3>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="feedback"></h3>

<div id="stars"></div>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">
Next ➜
</button>

</div>

<script>

const quiz=[

{question:"Which part helps you see?",answers:["Eyes","Hands","Feet","Nose"],correct:"Eyes"},
{question:"Which animal barks?",answers:["Dog","Cat","Fish","Cow"],correct:"Dog"},
{question:"What do plants need to grow?",answers:["Water","Sand","Plastic","Metal"],correct:"Water"},
{question:"Which one is a fruit?",answers:["Apple","Chair","Table","Book"],correct:"Apple"},
{question:"Where do fish live?",answers:["Water","Sky","Tree","House"],correct:"Water"},
{question:"Which body part helps you smell?",answers:["Nose","Eyes","Ears","Hands"],correct:"Nose"},
{question:"Which animal can fly?",answers:["Bird","Dog","Cat","Cow"],correct:"Bird"},
{question:"What gives us light in the day?",answers:["Sun","Moon","Lamp","Star"],correct:"Sun"},
{question:"Which one is a plant?",answers:["Tree","Car","Chair","Phone"],correct:"Tree"},
{question:"Which sense helps you hear?",answers:["Ears","Eyes","Nose","Hands"],correct:"Ears"}

];

let currentQuestion=0;
let score=0;

function loadQuestion(){

document.getElementById("feedback").innerHTML="";
document.getElementById("stars").innerHTML="";
document.getElementById("nextBtn").style.display="none";

let q=quiz[currentQuestion];

document.getElementById("question").innerHTML=
"Question "+(currentQuestion+1)+" / 10<br><br>"+q.question;

let answersHTML="";

q.answers.forEach(answer=>{
answersHTML+=`<button onclick="checkAnswer('${answer}')">${answer}</button>`;
});

document.getElementById("answers").innerHTML=answersHTML;

}

function checkAnswer(answer){

let correct=quiz[currentQuestion].correct;

if(answer===correct){

score++;
document.getElementById("feedback").innerHTML="✅ Correct!";
document.getElementById("stars").innerHTML="⭐ ⭐ ⭐";

}else{

document.getElementById("feedback").innerHTML="❌ Correct: "+correct;

}

document.getElementById("nextBtn").style.display="block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion<quiz.length){

loadQuestion();

}else{

document.querySelector(".quiz-box").innerHTML=
`<h2>🎉 Finished!</h2>
<h3>Your Score: ${score} / 10</h3>
<button onclick="location.reload()">Play Again</button>`;

}

}

loadQuestion();

</script>

</body>
</html>
