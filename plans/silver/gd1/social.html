<!DOCTYPE html>
<html>
<head>
<title>Grade 1 Social Studies Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>🌍 Grade 1 Social Studies Game</h2>

<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
  {"q":"Which is the largest animal?","o":["Dog","Elephant","Cat","Ant"],"a":"Elephant"},
  {"q":"How many days are in a week?","o":["10","7","3","5"],"a":"7"},
  {"q":"Which planet do we live on?","o":["Moon","Sun","Earth","Mars"],"a":"Earth"},
  {"q":"Which is a fruit?","o":["Apple","Potato","Carrot","Onion"],"a":"Apple"},
  {"q":"Which is a vehicle?","o":["Rock","Car","House","Tree"],"a":"Car"},
  {"q":"Which animal says 'Meow'?","o":["Dog","Cat","Cow","Horse"],"a":"Cat"},
  {"q":"Which color is the sun?","o":["Blue","Yellow","Black","Green"],"a":"Yellow"},
  {"q":"Which animal can fly?","o":["Elephant","Bird","Cat","Dog"],"a":"Bird"},
  {"q":"Which is used to write?","o":["Pen","Book","Chair","Table"],"a":"Pen"},
  {"q":"Which is a body part?","o":["Hand","Car","Apple","Chair"],"a":"Hand"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

let data=quiz[current];
q.innerText=data.q;
opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;
div.onclick=()=>check(option);
opt.appendChild(div);
});

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="Correct!";
}
else{
feedback.innerHTML="Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}
else{
finish();
}

}

function finish(){
q.innerHTML="Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
