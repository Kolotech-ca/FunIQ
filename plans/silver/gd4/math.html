<!DOCTYPE html>
<html>
<head>
<title>Grade 4 Math Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Comic Sans MS',cursive;
background:linear-gradient(to right,#bde0fe,#ffc8dd);
text-align:center;
padding:20px;
}

.quiz-box{
background:white;
max-width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.option{
background:#d0f0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.option:hover{background:#ffd6eb;}

.feedback{font-size:20px;margin-top:10px;}
.score{font-size:28px;color:#ff4da6;margin-top:20px;}
.stars{font-size:24px;color:#FFD700;margin:10px;}

</style>
</head>

<body>

<div class="quiz-box">

<h2>📘 Grade 4 Math Game</h2>

<h3 id="question"></h3>
<div id="options"></div>

<div id="feedback" class="feedback"></div>
<div id="stars" class="stars"></div>
<div id="score" class="score"></div>

<button onclick="location.reload()">Restart</button>

</div>

<script>

const quiz=[
  {"question":"What is 25 + 17?","o":["42","43","41","44"],"a":"42"},
  {"question":"What is 50 - 28?","o":["22","21","23","24"],"a":"22"},
  {"question":"What is 6 × 7?","o":["42","40","48","36"],"a":"42"},
  {"question":"What is 81 ÷ 9?","o":["9","8","10","7"],"a":"9"},
  {"question":"Which number comes after 199?","o":["200","201","198","199"],"a":"200"},
  {"question":"Which number comes before 305?","o":["304","303","306","305"],"a":"304"},
  {"question":"What is 14 + 29?","o":["43","44","42","45"],"a":"43"},
  {"question":"What is 36 - 18?","o":["18","17","19","20"],"a":"18"},
  {"question":"Which is an even number?","o":["28","27","29","31"],"a":"28"},
  {"question":"Which is an odd number?","o":["33","34","32","36"],"a":"33"}
];

let current=0;
let score=0;
let stars=0;

const q=document.getElementById("question");
const opt=document.getElementById("options");
const feedback=document.getElementById("feedback");
const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");

function loadQuestion(){

feedback.innerHTML="";

let data=quiz[current];

q.innerText=data.question;

opt.innerHTML="";

data.o.forEach(option=>{
let div=document.createElement("div");
div.className="option";
div.innerText=option;

div.onclick=function(){
check(option);
};

opt.appendChild(div);
});

starsEl.innerHTML="⭐".repeat(stars);

}

function check(answer){

if(answer===quiz[current].a){
score++;
stars++;
feedback.innerHTML="✅ Correct!";
}else{
feedback.innerHTML="❌ Wrong! Correct: "+quiz[current].a;
}

starsEl.innerHTML="⭐".repeat(stars);

current++;

if(current<quiz.length){
setTimeout(loadQuestion,1000);
}else{
finish();
}

}

function finish(){
q.innerHTML="🏆 Quiz Completed!";
opt.innerHTML="";
scoreEl.innerHTML="Score: "+score+" / "+quiz.length;
}

loadQuestion();

</script>

</body>
</html>
