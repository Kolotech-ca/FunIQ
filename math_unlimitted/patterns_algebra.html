<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patterns & Algebra</title>

<style>
body {
    text-align: center;
    font-family: Comic Sans MS, cursive;
    background: linear-gradient(to right, #fbc2eb, #a6c1ee);
}

h1 {
    color: #ff4081;
    font-size: 40px;
}

select, input {
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    margin: 5px;
    text-align: center;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin: 10px;
    background-color: #ff9800;
    color: white;
}

button:hover {
    background-color: #e68900;
}

#questionRow{
    font-size:35px;
    margin:20px;
}

#result {
    font-size: 25px;
    margin: 20px;
    font-weight: bold;
}

#score, #highScore, #badges {
    font-size: 22px;
    margin: 5px;
}

.light {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    margin: 10px auto;
    background-color: gray;
}

.green {
    background-color: limegreen;
    box-shadow: 0 0 20px limegreen;
}

.red {
    background-color: red;
    box-shadow: 0 0 20px red;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
    }
}
</style>
</head>
<body>

<h1>🎉 Patterns & Algebra 🎉</h1>

<label>Difficulty: </label>
<select id="level">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
</select>

<div id="questionRow">
<span id="question"></span>
<input type="text" id="answer" placeholder="Your Answer">
</div>

<button onclick="checkAnswer()">Submit</button>
<button onclick="generateQuestion()">New Question</button>

<div class="light" id="light"></div>

<div id="result"></div>

<div id="score">Score: 0 ⭐</div>
<div id="highScore">High Score: 0 🏆</div>
<div id="badges">Badges: None 🏅</div>

<script>
// Sound Effects
const correctSound = new Audio("https://www.soundjay.com/button/beep-07.wav");
const wrongSound = new Audio("https://www.soundjay.com/button/beep-08b.wav");

// Variables
let currentQuestion, currentAnswer;
let score = 0;
let highScore = localStorage.getItem("patternHighScore") || 0;
let badges = 0;

document.getElementById("highScore").innerHTML = "High Score: " + highScore + " 🏆";

// Patterns & Algebra Questions
function generateQuestion() {
    const level = document.getElementById("level").value;
    let q, a;

    if (level === "easy") {
        // Simple number patterns
        let start = Math.floor(Math.random() * 10);
        let step = Math.floor(Math.random() * 5) + 1;
        q = `${start}, ${start+step}, ${start+2*step}, ?`;
        a = start + 3*step;
    } else if (level === "medium") {
        // Simple algebra: Solve x + n = m
        let x = Math.floor(Math.random() * 20);
        let n = Math.floor(Math.random() * 10) + 1;
        let result = x + n;
        q = `x + ${n} = ${result}. Find x`;
        a = x;
    } else {
        // Hard algebra: Solve 2x + n = m
        let x = Math.floor(Math.random() * 20);
        let n = Math.floor(Math.random() * 10) + 1;
        let result = 2*x + n;
        q = `2x + ${n} = ${result}. Find x`;
        a = x;
    }

    currentQuestion = q;
    currentAnswer = a;

    document.getElementById("question").innerHTML = currentQuestion;
    document.getElementById("answer").value = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("light").className = "light";
    document.getElementById("answer").focus();
}

// Check answer
function checkAnswer() {
    const userAnswer = document.getElementById("answer").value.trim();
    const light = document.getElementById("light");

    if (parseInt(userAnswer) === currentAnswer) {
        score++;
        correctSound.play();
        document.getElementById("result").innerHTML = "🎉 Correct! Superstar!";
        light.className = "light green";
        launchConfetti();

        if (score > highScore) {
            highScore = score;
            localStorage.setItem("patternHighScore", highScore);
            document.getElementById("highScore").innerHTML = "High Score: " + highScore + " 🏆";
        }

        if (score === 5) {
            badges++;
            document.getElementById("badges").innerHTML = "Badges: 5 Questions 🏅";
        } else if (score === 10) {
            badges++;
            document.getElementById("badges").innerHTML = "Badges: 10 Questions 🏅";
        }

        document.getElementById("score").innerHTML = "Score: " + score + " ⭐";

        setTimeout(generateQuestion, 1000);

    } else {
        wrongSound.play();
        document.getElementById("result").innerHTML = `❌ Wrong! Correct Answer is ${currentAnswer}`;
        light.className = "light red";
    }
}

// Confetti
function launchConfetti() {
    for (let i = 0; i < 60; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        confetti.style.animationDuration = (Math.random()*2+2) + "s";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
    }
}

// Enter key submission
document.getElementById("answer").addEventListener("keypress", function(e){
    if(e.key === "Enter") checkAnswer();
});

generateQuestion();
</script>

</body>
</html>
