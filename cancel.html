<!DOCTYPE html>

<html lang="en">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff4ecd, #4da6ff);
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    .icon {
      font-size: 65px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      margin-bottom: 25px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      border-radius: 30px;
      background: #fff;
      color: #ff4ecd;
      font-weight: 600;
      text-decoration: none;
      margin: 5px;
      transition: 0.3s;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #f3f3f3;
    }

    .secondary-btn {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
    }

    .secondary-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>

</head>

  <script>
    const params = new URLSearchParams(window.location.search);

    if (productId) {
      document.getElementById("productInput").value = productId;
