<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Successful - Funiq</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff4ecd, #4da6ff);
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    .icon {
      font-size: 70px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 30px;
      background: #fff;
      color: #ff4ecd;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #f3f3f3;
    }

    .hidden {
      display: none;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      margin: 15px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>

</head>

<body>

    <div class="icon">✔</div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    if (!sessionId) {
      document.getElementById("statusText").innerText = "Invalid session.";
    } else {
      fetch(`https://yourdomain.com/get-download.php?session_id=${sessionId}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("spinner").style.display = "none";

          if (data.success) {
            document.getElementById("statusText").innerText = "Your file is ready!";
            const btn = document.getElementById("downloadBtn");
            btn.href = data.link;
            btn.classList.remove("hidden");
          } else {
            document.getElementById("statusText").innerText = "Error: " + data.error;
          }
        })
        .catch(() => {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("statusText").innerText = "Something went wrong.";
        });
    }
  </script>

</body>
</html>
